name: Build KiiPlugins

on:
  push:
    branches: [ main ]
  workflow_dispatch: # lets you trigger manually from GitHub on your phone

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Generate manifests
        run: node generate-manifests.js

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all plugins
        run: ./gradlew buildAll

      - name: List built plugins
        run: ls -la dist/

      # Upload every .zip as a downloadable artifact
      - name: Upload plugin ZIPs
        uses: actions/upload-artifact@v3
        with:
          name: KiiPlugins
          path: dist/*.zip
          retention-days: 30

      # Also create a GitHub Release so you can download directly on mobile
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: KiiPlugins Latest Build
          body: |
            ## KiiPlugins 💜
            Vencord-style Aliucord plugins by Kii

            ### How to install on your phone:
            1. Download the `.zip` files below
            2. Move them to `/sdcard/Aliucord/plugins/`
            3. Restart Discord

            ### Plugins included:
            - **SilentTyping** — others won't see you typing
            - **NoTrack** — blocks Discord analytics
            - **MessageLogger** — logs deleted/edited messages
            - **AlwaysTrust** — no link warning popups
            - **BetterChatbox** — character counter
            - **ShowNSFW** — bypasses age gate
            - **NoTypingIndicator** — hides typing indicators
            - **PronounDB** — shows pronouns on profiles
            - **KiiSettings** — Vencord-style settings UI
          files: dist/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
